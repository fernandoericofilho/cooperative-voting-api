name: Tests & Quality

on:
  push:
    branches: [ main, develop, feature/* ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: votacao
          POSTGRES_USER: votacao
          POSTGRES_PASSWORD: votacao
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
    - uses: actions/checkout@v4.1.7

    - name: Set up JDK 17
      uses: actions/setup-java@v4.2.1
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Run tests with coverage
      run: ./gradlew test jacocoTestReport --no-daemon

    - name: Upload test results
      if: always()
      uses: actions/upload-artifact@v4.3.6
      with:
        name: test-results
        path: build/reports/tests/test/

    - name: Upload coverage report
      if: always()
      uses: actions/upload-artifact@v4.3.6
      with:
        name: coverage-report
        path: build/reports/jacoco/test/html/

    - name: Verify code coverage
      run: |
        COVERAGE=$(grep -o "<counter type=\"LINE\" missed=\"[0-9]*\" covered=\"[0-9]*\"" build/reports/jacoco/test/jacocoTestReport.xml | tail -1 | awk -F'"' '{missed=$4; covered=$8; pct=(covered*100)/(missed+covered); printf "%.1f", pct}')
        echo "Code Coverage: ${COVERAGE}%"
        if (( $(echo "$COVERAGE < 80" | bc -l) )); then
          echo "ERROR: Code coverage ${COVERAGE}% is below 80% threshold"
          exit 1
        fi

    - name: Build with Gradle
      run: ./gradlew build -x test --no-daemon

    - name: Docker build
      run: docker build -t cooperative-voting-api:latest .
