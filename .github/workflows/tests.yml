name: Tests & Quality

on:
  push:
    branches: [ main, develop, feature/* ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: votacao
          POSTGRES_USER: votacao
          POSTGRES_PASSWORD: votacao
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
    - uses: actions/checkout@v4.2.1

    - name: Set up JDK 17
      uses: actions/setup-java@v4.3.0
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Run tests with coverage
      run: ./gradlew test jacocoTestReport --no-daemon

    - name: Upload test results
      if: always()
      uses: actions/upload-artifact@v4.4.3
      with:
        name: test-results
        path: build/reports/tests/test/

    - name: Upload coverage report
      if: always()
      uses: actions/upload-artifact@v4.4.3
      with:
        name: coverage-report
        path: build/reports/jacoco/test/html/

    - name: Verify code coverage
      run: |
        python3 << 'EOF'
        import xml.etree.ElementTree as ET
        import sys

        tree = ET.parse('build/reports/jacoco/test/jacocoTestReport.xml')
        root = tree.getroot()

        # Get all LINE counters and find the last one (total)
        counters = root.findall('.//counter[@type="LINE"]')
        if counters:
            last = counters[-1]
            missed = int(last.get('missed', 0))
            covered = int(last.get('covered', 0))
            total = missed + covered
            if total > 0:
                coverage = (covered * 100.0) / total
                print(f'Code Coverage: {coverage:.1f}%')
                if coverage < 80:
                    print(f'ERROR: Code coverage {coverage:.1f}% is below 80% threshold')
                    sys.exit(1)
                else:
                    print(f'✓ Coverage {coverage:.1f}% meets 80% minimum')
            else:
                print('ERROR: No coverage data found')
                sys.exit(1)
        else:
            print('ERROR: No LINE counter found in Jacoco report')
            sys.exit(1)
        EOF

    - name: Build with Gradle
      run: ./gradlew build -x test --no-daemon

    - name: Docker build
      run: docker build -t cooperative-voting-api:latest .
