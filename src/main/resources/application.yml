spring:
  application:
    name: cooperative-voting-api
  profiles:
    active: default
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:votacao}
    username: ${DB_USER:votacao}
    password: ${DB_PASSWORD:votacao}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true

# External service configuration
# NOTE: https://user-info.herokuapp.com is OFFLINE (Heroku deprecated free dynos)
# Using mock implementation that returns ELIGIBLE for all CPFs
app:
  external:
    user-info-url: https://user-info.herokuapp.com
    timeout-seconds: 3
  mock:
    # Set to 'false' when external service is restored
    enabled: true

resilience4j:
  circuitbreaker:
    configs:
      default:
        failureRateThreshold: 50
        slowCallRateThreshold: 50
        waitDurationInOpenState: 30000  # 30s
        permittedNumberOfCallsInHalfOpenState: 3
        minimumNumberOfCalls: 5
    instances:
      userInfoClient:
        baseConfig: default
  retry:
    configs:
      default:
        maxAttempts: 2
        waitDuration: 200

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always
      probes:
        enabled: true
  health:
    livenessState:
      enabled: true
    readinessState:
      enabled: true
  metrics:
    export:
      simple:
        enabled: true

logging:
  level:
    root: INFO
    org.springframework.web: INFO
    org.hibernate: WARN
    com.sicredi.voting: INFO

springdoc:
  swagger-ui:
    enabled: true
    path: /swagger-ui.html
    operationsSorter: method
    tagsSorter: alpha
  api-docs:
    path: /v3/api-docs
  show-actuator: true
