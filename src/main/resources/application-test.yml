spring:
  application:
    name: cooperative-voting-api
  datasource:
    url: jdbc:h2:mem:testdb;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create
    open-in-view: false
  h2:
    console:
      enabled: true
  flyway:
    enabled: true
    locations: classpath:db/migration
    baselineOnMigrate: true

app:
  external:
    user-info-url: http://localhost:9999
    timeout-seconds: 1

resilience4j:
  circuitbreaker:
    configs:
      default:
        failureRateThreshold: 50
        waitDurationInOpenState: 1000
  retry:
    configs:
      default:
        maxAttempts: 1

logging:
  level:
    root: WARN
    com.sicredi: INFO
    org.springframework.test: WARN
    org.hibernate.engine.transaction.internal: WARN
